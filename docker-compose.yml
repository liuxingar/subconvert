services:
  subboost-local:
    build: .
    image: subboost-local:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /app/data/subboost.db
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me
      LOCAL_USER_PASSWORD: local
      APP_VERSION: 0.1.0-local
      SUBBOOST_DISPLAY_TIME_ZONE: Asia/Shanghai
      SUBBOOST_SCHEDULER_ENABLED: "true"
      SUBBOOST_REFRESH_SCAN_SECONDS: "300"
      SUBBOOST_REFRESH_ON_STARTUP: "true"
      SUBBOOST_REFRESH_STARTUP_DELAY_SECONDS: "5"
    volumes:
      - ./data:/app/data
